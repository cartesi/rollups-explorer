name: "Chromatic"
on: push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  NEXT_PUBLIC_CARTESI_NODE_RPC_URL: http://127.0.0.1:10011/rpc
  NEXT_PUBLIC_MOCK_ENABLED: true
jobs:
  chromatic-deployment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          fetch-depth: 0 #required to retrieve git history

      - name: Install pnpm
        uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 #v6.0.7
        with:
          package_json_file: "package.json"

      - name: Setup Node.js environment
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Code format check
        run: pnpm format:check

      - name: Linting
        run: pnpm lint

      - name: Build Storybook
        run: pnpm build:storybook --filter=explorer

      - name: Publish to Chromatic
        uses: chromaui/action@8d925269a481085d451544f6bd9aa2ab3af55b5d #16.9.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: storybook-static
          workingDir: ./apps/explorer
          exitOnceUploaded: true
